  <line x1="30" y1="0" x2="30" y2="200" stroke="#e0d5c8" stroke-width="0.2" opacity="0.15"/>
  <line x1="80" y1="0" x2="80" y2="200" stroke="#e0d5c8" stroke-width="0.2" opacity="0.15"/>
